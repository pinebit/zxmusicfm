name: TypeScript sanity and production build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # `build` runs content validation, engine verification, and typecheck before
      # Vite, so a separate typecheck step would only repeat work.
      - run: npm run build
